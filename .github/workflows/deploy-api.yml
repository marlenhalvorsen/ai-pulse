name: Deploy API to Oracle Cloud VM

on:
  push:
    branches: [ "main" ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Set up .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"

      - name: Publish AiPulse.Api
        run: dotnet publish AiPulse.Api -c Release -r linux-x64 --self-contained false -o publish

      - name: Copy files to VM
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.OCI_SSH_HOST }}
          username: ${{ secrets.OCI_SSH_USER }}
          key: ${{ secrets.OCI_SSH_KEY }}
          source: publish/
          target: /opt/ai-pulse/staging
          strip_components: 1

      - name: Swap and restart service
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.OCI_SSH_HOST }}
          username: ${{ secrets.OCI_SSH_USER }}
          key: ${{ secrets.OCI_SSH_KEY }}
          script: |
            sudo systemctl stop ai-pulse-api || true
            sudo rm -rf /opt/ai-pulse/app
            sudo mv /opt/ai-pulse/staging /opt/ai-pulse/app
            sudo systemctl start ai-pulse-api
            sudo systemctl is-active --quiet ai-pulse-api
